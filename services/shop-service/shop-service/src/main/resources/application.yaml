# Server Configuration
server:
  port: 8081

spring:
  application:
    name: shop-service
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/matchafinder
    # url: jdbc:postgresql://matcha-postgres:5432/matchafinder
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Logging
logging:
  level:
    com.matchamap: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      # Show detailed health information for debugging purposes
      show-details: always
  health:
    # Enable default health checks
    defaults:
      enabled: true